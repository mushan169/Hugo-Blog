{{ define "main" }}
<article class="mx-auto max-w-3xl px-4 py-10">
    <header class="mb-8">
        <h1 class="text-4xl font-semibold tracking-tight text-slate-900">{{ .Title }}</h1>
    </header>

    <div class="max-w-none leading-8 text-slate-700">
        {{ .Content }}
    </div>

    <div class="mt-10">
        <a href="{{ "/post/" | relURL}}"
            class="inline-flex justify-center items-center rounded border-2 border-[#e5c9d0] bg-[#faf8f5] px-4 py-2 text-gray-600 transition-colors hover:bg-[#e5c9d0]">
            返回
        </a>
    </div>
</article>
{{ end }}
