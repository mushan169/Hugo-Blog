<section class="home-banner" aria-label="Homepage banner">
    <div class="home-banner__background">
        <div id="vegas-slideshow"></div>
    </div>
    <div class="home-banner__scrim"></div>
    <div class="home-banner__content">
        <div class="home-banner__actions" aria-label="Homepage banner actions"></div>
        <div class="home-banner__body">
            <p class="home-banner__eyebrow">Personal blog</p>
            <h1 class="home-banner__title">{{ .Site.Title }}</h1>
            <p class="home-banner__summary">
                Verweile doch, du bist so schön
                <!-- A dedicated foreground layer is reserved here for future buttons, links, and hero copy. -->
            </p>
        </div>
    </div>
</section>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vegas/2.4.4/vegas.min.css" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vegas/2.4.4/vegas.min.js"></script>

<script>
    $(function () {
        $.getJSON('/json/index.json', function (slides) {
            const vegasSlides = slides.map(function (src) {
                return { src: src };
            });

            $('#vegas-slideshow').vegas({
                slides: vegasSlides,
                timer: false,
                preload: true,
                transition: 'blur2',
                transitionDuration: 2000,
                delay: 10000,
                animation: 'random',
                animationDuration: 20000,
                overlay: '/img/overlays/dot.gif',
                loop: true
            });
        });
    });
</script>

<style>
    #vegas-slideshow {
        width: 100%;
        height: 100%;
    }
</style>
